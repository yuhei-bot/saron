
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>in'dex hair | 通いたくなる美容室</title>
  <style>
    :root { --accent: #d89689; --line: #06C755; --text: #4a4440; --bg: rgba(255, 255, 255, 0.9); }
    * { box-sizing: border-box; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; color: var(--text); margin: 0; background: #000; line-height: 1.6; }

    /* --- 背景スライドショー --- */
    .full-bg-slider { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; }
    .bg-img {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      opacity: 0; animation: fadeLoop 24s infinite;
    }
    .bg-img:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1560066984-138dadb4c035?q=80&w=1200'); animation-delay: 0s; }
    .bg-img:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=1200'); animation-delay: 6s; }
    .bg-img:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=1200'); animation-delay: 12s; }
    .bg-img:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1600948836101-f9ffda59d250?q=80&w=1200'); animation-delay: 18s; }

    @keyframes fadeLoop {
      0% { opacity: 0; transform: scale(1.0); }
      10% { opacity: 1; }
      25% { opacity: 1; }
      35% { opacity: 0; transform: scale(1.05); }
      100% { opacity: 0; }
    }

    /* --- ヘッダー --- */
    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 90px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 30px; z-index: 3000;
    }
    .logo { color: #fff; font-size: 2.2rem; letter-spacing: 5px; font-weight: 300; text-shadow: 0 2px 15px rgba(0,0,0,0.6); }

    /* --- ハンバーガーメニュー進化版 --- */
    #menu-btn-check { display: none; }
    .menu-btn {
      width: 55px; height: 55px; background: rgba(255,255,255,0.9);
      border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s;
    }
    .menu-btn span, .menu-btn span:before, .menu-btn span:after {
      content: ''; display: block; height: 2px; width: 24px; background: var(--text); position: absolute; transition: 0.3s;
    }
    .menu-btn span:before { bottom: 8px; } .menu-btn span:after { top: 8px; }
    
    /* 開いている時のボタン（×） */
    #menu-btn-check:checked ~ .menu-btn span { background: transparent; }
    #menu-btn-check:checked ~ .menu-btn span:before { bottom: 0; transform: rotate(45deg); }
    #menu-btn-check:checked ~ .menu-btn span:after { top: 0; transform: rotate(-45deg); }

    /* メニュー背景（画面全体） */
    .menu-content {
      position: fixed; inset: 0; z-index: 2500; background: rgba(255,255,255,0.98);
      display: flex; align-items: center; justify-content: center; 
      opacity: 0; visibility: hidden; transition: 0.4s ease;
    }
    #menu-btn-check:checked ~ .menu-content { opacity: 1; visibility: visible; }

    .menu-content ul { list-style: none; padding: 0; text-align: center; }
    .menu-content a { display: block; padding: 20px; font-size: 1.4rem; text-decoration: none; color: var(--text); letter-spacing: 3px; }

    /* 閉じるボタン（メニュー内の上部にも配置） */
    .menu-close-area { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: var(--text); cursor: pointer; padding: 10px; }

    /* --- FV中央 --- */
    .content-wrapper { position: relative; z-index: 1; padding-top: 120px; }
    .fv-center { text-align: center; color: #fff; margin: 60px 0; }
    .fv-center p { font-size: 2.2rem; letter-spacing: 10px; margin: 0; font-weight: bold; text-shadow: 0 4px 20px rgba(0,0,0,0.7); }
    .fv-line-wrap { margin-top: 45px; display: inline-block; text-decoration: none; color: #fff; transition: 0.3s; }
    .fv-line-wrap img { width: 130px; height: 130px; filter: drop-shadow(0 0 25px rgba(6,199,85,0.8)); animation: pulse 2s infinite; }
    .line-caption { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 18px; letter-spacing: 3px; background: var(--line); padding: 8px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

    /* --- セクション・スライダー --- */
    .glass-section { background: var(--bg); backdrop-filter: blur(10px); margin: 15px; border-radius: 35px; padding-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .section-label { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); text-align: center; padding: 25px 0 15px; font-weight: bold; }
    .slider-outer { width: 100%; overflow: hidden; padding: 0 15px; }
    .slider-inner { display: flex; gap: 8px; transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1); }
    .slide-item { flex: 0 0 calc(33.333% - 5.4px); aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .slide-item img { width: 100%; height: 100%; object-fit: cover; }

    /* --- フッター --- */
    .footer-info { text-align: center; padding: 25px 20px; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 450px; margin: 0 auto; }
    .info-item { text-decoration: none; color: var(--text); font-size: 0.75rem; padding: 15px 5px; border-radius: 15px; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); }
    .info-item b { color: var(--accent); font-size: 0.6rem; margin-bottom: 4px; display: block; letter-spacing: 1px; }

    /* --- 右下固定 --- */
    #fixed-btns { position: fixed; right: 20px; bottom: 25px; z-index: 5000; display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
    .fixed-line-btn { background: var(--line); color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 25px rgba(6,199,85,0.4); }
    .fixed-line-btn span:last-child { font-size: 0.6rem; opacity: 0.9; margin-top: 2px; }
    #to-top-btn { width: 50px; height: 50px; background: var(--text); color: #fff; border: none; border-radius: 50%; cursor: pointer; font-size: 0.6rem; font-weight: bold; opacity: 0; visibility: hidden; transition: 0.4s; }
    #to-top-btn.is-show { opacity: 1; visibility: visible; }

    /* --- モーダル --- */
    .modal { display: none; position: fixed; inset: 0; z-index: 6000; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 30px; padding: 30px; text-align: center; position: relative; }
    .modal-img { width: 100%; border-radius: 20px; margin-bottom: 15px; aspect-ratio: 1/1; object-fit: cover; }
    .close { position: absolute; top: -50px; right: 0; color: #fff; font-size: 2.5rem; cursor: pointer; }

    @media (max-width: 480px) {
      .logo { font-size: 1.8rem; }
      .fv-center p { font-size: 1.8rem; letter-spacing: 6px; }
      .fv-line-wrap img { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>

  <div class="full-bg-slider">
    <div class="bg-img"></div><div class="bg-img"></div><div class="bg-img"></div><div class="bg-img"></div>
  </div>

  <header>
    <div class="logo">in'dex hair</div>
    <div class="menu-box">
      <input type="checkbox" id="menu-btn-check">
      <label for="menu-btn-check" class="menu-btn"><span></span></label>
      <div class="menu-content" id="menu-overlay">
        <div class="menu-close-area" onclick="closeMenu()">&times;</div>
        <ul>
          <li><a href="https://yuhei-bot.github.io/saron/" onclick="closeMenu()">ホーム</a></li>
          <li><a href="https://yuhei-bot.github.io/staff/" onclick="closeMenu()">スタッフ</a></li>
          <li><a href="#" onclick="closeMenu()">ギャラリー</a></li>
          <li><a href="https://yuhei-bot.github.io/counseling/" target="_blank" onclick="closeMenu()">お悩み診断</a></li>
          <li><a href="#" onclick="closeMenu()">FAQ</a></li>
          
        </ul>
      </div>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="fv-center">
      <p>通いたくなる美容室</p>
      <a href="https://line.me" class="fv-line-wrap">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE予約">
        <span class="line-caption">24時間受付可能</span>
      </a>
    </div>

    <div class="glass-section">
      <div class="section-label">concept</div>
      <div class="slider-outer">
        <div class="slider-inner" id="slider-concept">
          <div class="slide-item" onclick="openModal('髪質改善', '芯から輝く美髪へ。', 'https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=400')"><img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('似合わせカット', '骨格を美しく見せる黄金比。', 'https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=400')"><img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('艶カラー', '透明感のある大人色。', 'https://images.unsplash.com/photo-1516738901171-8eb4fc13bd20?q=80&w=400')"><img src="https://images.unsplash.com/photo-1516738901171-8eb4fc13bd20?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('ヘッドスパ', '頭皮から整える贅沢ケア。', 'https://images.unsplash.com/photo-1559599101-f09722fb4948?q=80&w=400')"><img src="https://images.unsplash.com/photo-1559599101-f09722fb4948?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('完全個室', '贅沢なプライベートタイム。', 'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?q=80&w=400')"><img src="https://images.unsplash.com/photo-1600948836101-f9ffda59d250?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('低刺激薬剤', '10年先も美しい髪のために。', 'https://images.unsplash.com/photo-1527799822394-46a485bc948b?q=80&w=400')"><img src="https://images.unsplash.com/photo-1527799822394-46a485bc948b?q=80&w=400"></div>
        </div>
      </div>
    </div>

    <div class="glass-section">
      <div class="section-label">INTERIOR</div>
      <div class="slider-outer">
        <div class="slider-inner" id="slider-interior">
          <div class="slide-item" onclick="openModal('セット面', '開放感あふれる店内。', 'https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=400')"><img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('シャンプー', 'フルフラットで夢心地。', 'https://images.unsplash.com/photo-1560869713-7d0a29430039?q=80&w=400')"><img src="https://images.unsplash.com/photo-1560869713-7d0a29430039?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('ラウンジ', 'カフェのような待合空間。', 'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?q=80&w=400')"><img src="https://images.unsplash.com/photo-1600948836101-f9ffda59d250?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('レセプション', '心からの笑顔でお迎え。', 'https://images.unsplash.com/photo-1527799822394-46a485bc948b?q=80&w=400')"><img src="https://images.unsplash.com/photo-1527799822394-46a485bc948b?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('インテリア', 'センスの光るセレクト。', 'https://images.unsplash.com/photo-1513519245088-0e12902e35a6?q=80&w=400')"><img src="https://images.unsplash.com/photo-1513519245088-0e12902e35a6?q=80&w=400"></div>
          <div class="slide-item" onclick="openModal('エントランス', '看板が目印です。', 'https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=400')"><img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=400"></div>
        </div>
      </div>
    </div>

    <div class="glass-section">
      <footer class="footer-info">
        <div class="info-grid">
          <a href="tel:0312345678" class="info-item"><b>TEL</b>03-1234-5678</a>
          <a href="https://line.me" class="info-item"><b>LINE予約</b>24時間受付可能</a>
          <a href="mailto:info@example.com" class="info-item"><b>MAIL</b>メール相談</a>
          <div class="info-item"><b>ADDRESS</b>東京都〇〇区1-2-3</div>
        </div>
      </footer>
    </div>
  </div>

  <div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <span class="close" onclick="closeModal()">&times;</span>
      <img id="modal-img" src="" class="modal-img">
      <h3 id="modal-title" style="margin:0 0 10px; font-size:1.1rem;"></h3>
      <p id="modal-desc" style="font-size:0.85rem; margin:0; color:#666;"></p>
    </div>
  </div>

  <div id="fixed-btns">
    <a href="https://line.me" class="fixed-line-btn">
      <span>💬 LINE予約</span>
      <span>24時間受付可能</span>
    </a>
    <button id="to-top-btn" onclick="scrollToTop()">TOP</button>
  </div>

  <script>
    // メニューを閉じる関数
    function closeMenu() {
      document.getElementById('menu-btn-check').checked = false;
    }

    // メニューの外側（背景）をクリックしても閉じるように設定
    const menuOverlay = document.getElementById('menu-overlay');
    menuOverlay.addEventListener('click', function(e) {
      if (e.target === menuOverlay) {
        closeMenu();
      }
    });

    function openModal(title, desc, img) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-desc').innerText = desc;
      document.getElementById('modal-img').src = img;
      document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function initSlider(id) {
      const slider = document.getElementById(id);
      let count = 0;
      const totalSlides = 6;
      const visibleSlides = 3;
      setInterval(() => {
        count++;
        if (count > totalSlides - visibleSlides) count = 0;
        const slideWidth = slider.offsetWidth / visibleSlides;
        slider.style.transform = `translateX(-${count * slideWidth}px)`;
      }, 4500);
    }

    window.onload = () => {
      initSlider('slider-concept');
      initSlider('slider-interior');
    };

    const toTopBtn = document.getElementById('to-top-btn');
    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 400) toTopBtn.classList.add('is-show');
      else toTopBtn.classList.remove('is-show');
    });
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  </script>
</body>
</html>
